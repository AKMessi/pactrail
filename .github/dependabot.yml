version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      rust-dependencies:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    ignore:
      # This branch encodes Pactrail's MSRV, not the action implementation version.
      - dependency-name: dtolnay/rust-toolchain
