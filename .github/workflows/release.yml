name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive: pactrail-linux-x86_64.tar.gz
            kind: unix
          - os: macos-15
            archive: pactrail-macos-aarch64.tar.gz
            kind: unix
          - os: windows-latest
            archive: pactrail-windows-x86_64.zip
            kind: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@eac0f66a48bc4b70a10b9acd4c4e930f835d95ff # 1.95.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --workspace --all-features --locked
      - run: cargo build --release --locked -p pactrail
      - name: Package Unix binary
        if: matrix.kind == 'unix'
        shell: bash
        run: |
          mkdir package
          cp target/release/pactrail README.md LICENSE-MIT LICENSE-APACHE package/
          tar -C package -czf "${{ matrix.archive }}" .
      - name: Package Windows binary
        if: matrix.kind == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory package
          Copy-Item target/release/pactrail.exe, README.md, LICENSE-MIT, LICENSE-APACHE package/
          Compress-Archive -Path package/* -DestinationPath "${{ matrix.archive }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  release-soak:
    name: Release candidate deterministic soak
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@eac0f66a48bc4b70a10b9acd4c4e930f835d95ff # 1.95.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Enforce descriptor catalog budget
        run: cargo test --release --locked -p pactrail-tools --test descriptor_budget
      - name: Build repository-scale runner outside measurement
        run: cargo build --release --locked -p pactrail-context --example repository_scale
      - name: Run three fresh 5k-file lifecycles
        env:
          LC_ALL: C
        run: |
          mkdir -p artifacts
          /usr/bin/time -v -o artifacts/release-soak-resource-usage.txt \
            target/release/examples/repository_scale \
            --files 5000 \
            --iterations 3 \
            --context-bytes 32768 \
            --max-cold-ms 60000 \
            --max-warm-ms 15000 \
            --max-incremental-ms 15000 \
            --max-context-ms 5000 \
            > artifacts/release-soak.json
          rss_kib="$(awk -F: '/Maximum resident set size/ {gsub(/^[[:space:]]+/, "", $2); print $2}' artifacts/release-soak-resource-usage.txt)"
          test -n "$rss_kib"
          test "$rss_kib" -le 1572864
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: release-soak-evidence
          path: artifacts/
          if-no-files-found: error

  publish:
    needs: [build, release-soak]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - name: Include one-command installers
        run: cp install.sh install.ps1 artifacts/
      - name: Generate checksums
        run: sha256sum artifacts/* > artifacts/SHA256SUMS
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: artifacts/*
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" artifacts/* --verify-tag
          --notes-file "docs/release-$GITHUB_REF_NAME.md"
          --title "Pactrail $GITHUB_REF_NAME"

  install-smoke:
    name: Installer smoke / ${{ matrix.os }}
    needs: publish
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install published Unix release
        if: runner.os != 'Windows'
        env:
          PACTRAIL_INSTALL_DIR: ${{ runner.temp }}/pactrail-bin
          PACTRAIL_VERSION: ${{ github.ref_name }}
        run: |
          sh install.sh
          "$PACTRAIL_INSTALL_DIR/pactrail" --version
      - name: Install published Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installDir = Join-Path $env:RUNNER_TEMP "pactrail-bin"
          .\install.ps1 -InstallDir $installDir -Version $env:GITHUB_REF_NAME -NoModifyPath
          & (Join-Path $installDir "pactrail.exe") --version
