name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive: pactrail-linux-x86_64.tar.gz
            kind: unix
          - os: macos-15
            archive: pactrail-macos-aarch64.tar.gz
            kind: unix
          - os: windows-latest
            archive: pactrail-windows-x86_64.zip
            kind: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@eac0f66a48bc4b70a10b9acd4c4e930f835d95ff # 1.95.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --workspace --all-features --locked
      - run: cargo build --release --locked -p pactrail
      - name: Package Unix binary
        if: matrix.kind == 'unix'
        shell: bash
        run: |
          mkdir package
          cp target/release/pactrail README.md LICENSE-MIT LICENSE-APACHE package/
          tar -C package -czf "${{ matrix.archive }}" .
      - name: Package Windows binary
        if: matrix.kind == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory package
          Copy-Item target/release/pactrail.exe, README.md, LICENSE-MIT, LICENSE-APACHE package/
          Compress-Archive -Path package/* -DestinationPath "${{ matrix.archive }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum artifacts/* > artifacts/SHA256SUMS
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: artifacts/*
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" artifacts/* --verify-tag --generate-notes
