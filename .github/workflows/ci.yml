name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  quality:
    name: Quality / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@eac0f66a48bc4b70a10b9acd4c4e930f835d95ff # 1.95.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Validate Unix installer syntax
        if: runner.os != 'Windows'
        run: sh -n install.sh
      - name: Validate PowerShell installer syntax
        if: runner.os == 'Windows'
        shell: pwsh
        run: '[ScriptBlock]::Create((Get-Content -Raw install.ps1)) | Out-Null'
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Permission and storage failure recovery matrix
        run: cargo test --locked -p pactrail-workspace io_failure_matrix
      - run: cargo test --workspace --all-features --locked
      - run: cargo doc --workspace --all-features --no-deps --locked
      - run: cargo build --workspace --release --locked

  dependency-policy:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1

  oci-containment:
    name: OCI containment / Docker
    runs-on: ubuntu-latest
    env:
      PACTRAIL_OCI_TEST: "1"
      PACTRAIL_OCI_TEST_IMAGE: pactrail-oci-fixture:local
      PACTRAIL_HOST_SECRET: pactrail-host-secret-must-not-escape
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@eac0f66a48bc4b70a10b9acd4c4e930f835d95ff # 1.95.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build pinned local containment fixture
        run: docker build --pull --tag "$PACTRAIL_OCI_TEST_IMAGE" tests/fixtures/oci-sandbox
      - name: Run hostile-repository containment checks
        run: cargo test --locked -p pactrail-tools oci_backend_blocks_hostile_effects -- --ignored --nocapture
